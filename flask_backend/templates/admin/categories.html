{% extends 'admin/base.html' %}
{% block content %}
<div style="background:#fff; padding:20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
        <h3>Categories</h3>
        <button class="btn">+ Add Category</button>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for c in categories %}
            <tr>
                <td>{{ c.id }}</td>
                <td>{{ c.name }}</td>
                <td>{{ 'Yes' if c.is_active else 'No' }}</td>
                <td>
                    <button class="btn" style="padding:4px 8px; font-size:12px;">Edit</button>
                    <button class="btn btn-danger" style="padding:4px 8px; font-size:12px;">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
