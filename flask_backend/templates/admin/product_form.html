{% extends 'admin/base.html' %} {% block content %}
<h2>{{ 'Edit Product' if product else 'Add Product' }}</h2>

<form method="POST" enctype="multipart/form-data">
  <p>
    <input name="name" value="{{ product.name if product else '' }}" required />
  </p>

  <p>
    <label>Price</label><br />
    <input
      name="price"
      type="number"
      step="0.01"
      value="{{ product.price if product else '' }}"
      required
    />
  </p>
  <p>
    <label>Description</label><br />
    <textarea name="description" rows="4">
{{ product.description if product else '' }}</textarea
    >
  </p>
  <p>
    <label>Image</label><br />
    <input type="file" name="image_file" accept="image/*" />
    <input
      type="hidden"
      name="old_image"
      value="{{ product.image if product else '' }}"
    />
  </p>

  <p>
    <label>Stock</label><br />
    <input
      name="stock_quantity"
      type="number"
      value="{{ product.stock_quantity if product else 100 }}"
    />
  </p>

  <button type="submit">Save</button>
</form>
{% endblock %}
