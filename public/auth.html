<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول / إنشاء حساب | B&W</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Cairo", sans-serif; background: #0a0a0a; color: #fff; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;}
        .card { background: #1a1a1a; padding: 40px; border-radius: 12px; width: 350px; text-align: center; border-top: 4px solid #c9a962; }
        .tabs { display:flex; margin-bottom: 20px; }
        .tab { flex:1; padding: 10px; cursor: pointer; border-bottom: 2px solid #333; font-weight: bold; }
        .tab.active { border-bottom: 2px solid #c9a962; color: #c9a962; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; font-family: "Cairo"; }
        button { width: 100%; padding: 12px; background: #c9a962; color: #000; font-weight: bold; font-family: "Cairo"; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #b89851; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .error { color: #ff4d4d; font-size: 0.9em; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>أهلاً بك في بلاك آند وايت</h2>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">تسجيل الدخول</div>
            <div class="tab" onclick="switchTab('register')">إنشاء حساب</div>
        </div>
        
        <div id="errorMsg" class="error"></div>

        <div id="loginSection" class="form-section active">
            <input type="text" id="loginPhone" placeholder="رقم الهاتف (مثال: 01012345678)" maxlength="11">
            <input type="password" id="loginPassword" placeholder="كلمة المرور">
            <button onclick="login()">تسجيل الدخول</button>
        </div>

        <div id="registerSection" class="form-section">
            <p style="font-size:0.8em; color:#aaa; margin-bottom:10px;">احصل على "ليمون نعناع" مجاناً عند أول تسجيل!</p>
            <input type="text" id="regName" placeholder="الاسم بالكامل">
            <input type="text" id="regPhone" placeholder="رقم الهاتف (11 رقم)" maxlength="11">
            <input type="password" id="regPassword" placeholder="كلمة المرور">
            <button onclick="register()">إنشاء الحساب</button>
        </div>
    </div>
    
    <script src="/integration/auth.js"></script>
</body>
</html>
