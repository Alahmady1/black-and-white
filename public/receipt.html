<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فاتورة الطلب | B&W</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: "Cairo", sans-serif; background: #fafafa; color: #333; margin:0; padding:40px;}
        .receipt { max-width: 400px; margin: 0 auto; background: #fff; padding: 30px; border: 1px solid #ddd; border-top: 5px solid #000; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align:center;}
        .logo { font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        .logo span { color: #c9a962; }
        .title { color: #777; font-size: 14px; margin-bottom: 20px; }
        .details { text-align: right; margin-bottom: 20px; font-size: 14px; }
        .items { width: 100%; border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; padding: 15px 0; margin-bottom: 20px; }
        .item { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        .total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; }
        .btn { display: inline-block; padding: 10px 20px; background: #000; color: #fff; text-decoration: none; border-radius: 4px; margin-top: 30px; }
        @media print { .btn { display: none; } body { background: #fff; } .receipt { border:none; box-shadow:none;} }
    </style>
</head>
<body>
    <div class="receipt">
        <div class="logo">BLACK<span>&</span>WHITE</div>
        <div class="title">Restaurant & Cafe</div>
        
        <div class="details" id="rDetails">
            <!-- Filled by JS -->
        </div>
        
        <div class="items" id="rItems">
            <!-- Filled by JS -->
        </div>
        
        <div class="total">
            <span>الإجمالي (نقداً)</span>
            <span id="rTotal">0 ج.م</span>
        </div>
        
        <a href="javascript:window.print()" class="btn">طباعة الفاتورة</a>
        <br>
        <a href="/menu.html" class="btn" style="background:#c9a962; color:#000; margin-top:10px;">العودة للقائمة</a>
    </div>

    <script>
        const orderData = JSON.parse(localStorage.getItem('bw_last_order'));
        if(!orderData) window.location.href = '/';
        
        document.getElementById('rDetails').innerHTML = `
            <div>رقم الطلب: ${orderData.order_number}</div>
            <div>التاريخ: ${new Date().toLocaleDateString('ar-EG')}</div>
            <div>العميل: ${localStorage.getItem('bw_customer_name') || 'زائر'}</div>
            <div style="margin-top:10px; font-weight:bold;">طريقة الدفع: الدفع عند الاستلام (كاش)</div>
        `;
        
        document.getElementById('rItems').innerHTML = orderData.items.map(i => `
            <div class="item">
                <span>${i.quantity}x ${i.name}</span>
                <span>${i.price * i.quantity}</span>
            </div>
        `).join('');
        
        document.getElementById('rTotal').innerText = `${orderData.total} ج.م`;
    </script>
</body>
</html>
